name: Claude Dependabot Alert Remediation

on:
  schedule:
    - cron: "0 9 1 * *" # 1st of each month at 9am UTC
  workflow_dispatch:

jobs:
  maintenance:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read
      id-token: write
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Generate GitHub App token for Dependabot alerts
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.DEPENDABOT_APP_ID }}
          private-key: ${{ secrets.DEPENDABOT_APP_PRIVATE_KEY }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Fetch Dependabot alerts and repo context
        id: ctx
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # Fetch all open Dependabot alerts as newline-delimited JSON objects
          # Note: GITHUB_TOKEN cannot access Dependabot alerts; uses a GitHub App
          # installation token (org-owned, no individual user dependency).
          if ! ALERTS=$(gh api "repos/${{ github.repository }}/dependabot/alerts" \
            --paginate \
            -q '.[] | select(.state=="open")' 2>&1); then
            echo "has_alerts=false" >> "$GITHUB_OUTPUT"
            echo "::error::Failed to fetch Dependabot alerts. Ensure security-events: read is permitted for GITHUB_TOKEN in this org. API response: $ALERTS"
            exit 0
          fi

          if [ -z "$ALERTS" ]; then
            echo "has_alerts=false" >> "$GITHUB_OUTPUT"
            echo "No open Dependabot alerts found. Skipping Claude step."
            exit 0
          fi

          echo "has_alerts=true" >> "$GITHUB_OUTPUT"

          # Collect Python manifest paths (excluding virtual envs and hidden dirs)
          MANIFESTS=$(find . \( -name pyproject.toml -o -name 'requirements*.txt' \) \
            -not -path '*/.venv/*' \
            -not -path '*/node_modules/*' \
            -not -path '*/__pycache__/*' \
            | sort | tr '\n' ' ')

          # Write both to files so the prompt can reference them cleanly
          echo "$ALERTS"    > /tmp/dependabot-alerts.txt
          echo "$MANIFESTS" > /tmp/manifests.txt

      - name: Claude Dependabot Alert Remediation
        if: steps.ctx.outputs.has_alerts == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.SECURITY_REMEDIATOR_API_KEY }}
          show_full_output: true
          github_token: ${{ github.token }}
          allowed_bots: "claude,graphite-app"
          claude_args: '--max-turns 60 --allowedTools "Grep,Glob,Read,Edit,Write,Bash(git *),Bash(uv *),Bash(gh pr *),Bash(gh api *),Bash(cat /tmp/*)"'
          prompt: |
            The repo is ${{ github.repository }}.

            Open Dependabot alerts have already been fetched and saved to /tmp/dependabot-alerts.txt (one JSON object per line).
            The list of Python manifest files in this repo is in /tmp/manifests.txt.

            Read both files, then for each alert:
            1. Identify the affected manifest path, package name, ecosystem, current version, and minimum patched version.
            2. If the manifest path does not appear in /tmp/manifests.txt, mark it as stale and skip it.
            3. This repository uses Python with uv. Update vulnerable dependencies using the most appropriate manifest for the alert:
               - For `pyproject.toml` dependencies, use `uv add '<package>>=<patched_version>'` from the directory containing that manifest.
               - For `requirements.txt` style manifests, update the pinned requirement entry directly if needed.
            4. After applying upgrades in a directory, refresh lockfiles with `uv lock` from that directory when applicable.
            5. Create a new branch and a PR titled `gradient-labs dependabot alert remediation <YYYY-MM-DD>` with a description table showing: alert number, severity, package, old version, new version, ecosystem, manifest updated. Note any stale alerts that were skipped.
